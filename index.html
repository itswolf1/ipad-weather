<!DOCTYPE html>
<html>
<head>
  <title>Weather</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    body { 
      margin: 0; 
      background: #EAE7E1; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      overflow: hidden;
      position: relative;
    }
    img { 
      width: 100%; 
      max-height: 100%; 
      object-fit: contain; 
    }
    #reload-btn {
      position: absolute;
      bottom: 30px;
      right: 30px;
      background-color: #7C8A76;
      color: white;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 30px;
      cursor: pointer;
      opacity: 0.3;
      transition: opacity 0.3s;
    }
    #reload-btn:active {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <img src="weather.png" id="w">
  <button id="reload-btn" onclick="forceReload()">↻</button>
  <script>
    function forceReload() {
      document.getElementById('w').src = 'weather.png?' + new Date().getTime();
    }
    setInterval(forceReload, 900000);
  </script>
</body>
</html>
