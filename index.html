<!DOCTYPE html>
<html>
<head>
  <title>Weather</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <style>
    body { margin: 0; background: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
    img { width: 100%; max-height: 100%; object-fit: contain; }
  </style>
</head>
<body>
  <img src="weather.png" id="w">
  <script>
    setInterval(function(){
      document.getElementById('w').src = 'weather.png?' + new Date().getTime();
    }, 900000);
  </script>
</body>
</html>
